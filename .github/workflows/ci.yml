name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  server:
    name: Server — build, lint, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learn_it_easy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/learn_it_easy_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test-access-secret-min-16-chars
      JWT_REFRESH_SECRET: test-refresh-secret-min-16-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter server exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/learn_it_easy_test

      - name: Run migrations
        run: pnpm --filter server exec dotenv -e ../../.env.ci -- prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/learn_it_easy_test

      - name: Build
        run: pnpm --filter server build

      - name: Lint
        run: pnpm --filter server lint

      - name: Unit tests
        run: pnpm --filter server test

      - name: E2E tests
        run: pnpm --filter server test:e2e

  client:
    name: Client — build, lint, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @learn-it-easy/client build

      - name: Lint
        run: pnpm --filter @learn-it-easy/client lint

      - name: Tests
        run: pnpm --filter @learn-it-easy/client test:run